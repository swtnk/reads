name: Update Content Manifest

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate content manifest
        run: node generate-manifest.js content .

      - name: Backup content and generated files
        run: |
          cp -r content /tmp/content-backup
          cp content-manifest.json /tmp/content-manifest.json.backup
          [ -d _generated ] && cp -r _generated /tmp/generated-backup || true

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Strip history of content/, manifest, and generated assets
        run: |
          git filter-repo \
            --path content/ \
            --path content-manifest.json \
            --path _generated/ \
            --invert-paths \
            --force

      - name: Restore content and generated files
        run: |
          cp -r /tmp/content-backup/* content/ 2>/dev/null || mkdir -p content
          cp -r /tmp/content-backup/. content/
          cp /tmp/content-manifest.json.backup content-manifest.json
          [ -d /tmp/generated-backup ] && cp -r /tmp/generated-backup _generated || true

      - name: Convert OG SVGs to PNGs
        run: |
          if [ -d _generated/og ]; then
            sudo apt-get install -y -qq librsvg2-bin >/dev/null 2>&1
            find _generated/og -name "*.svg" -exec sh -c 'rsvg-convert -w 1200 -h 630 "$1" -o "${1%.svg}.png"' _ {} \;
            find _generated/og -name "*.svg" -delete
            echo "Converted OG SVGs to PNGs"
          fi

      - name: Commit and force push
        run: |
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update content and manifest (no history)"
          git push --force origin main

      - name: Build site directory
        run: |
          mkdir -p _site
          find . -maxdepth 1 ! -name '.git' ! -name '_site' ! -name '.' ! -name '..' -exec cp -r {} _site/ \;
          if [ -d _site/_generated/pages ]; then
            cp -r _site/_generated/pages/* _site/
            echo "Overlaid article pages for OG support"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## Content Manifest Update :bookmark_tabs:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":white_check_mark: Content and manifest committed with clean history and force-pushed." >> $GITHUB_STEP_SUMMARY
