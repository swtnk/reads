server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    location /reads/ {
        # Serve per-article OG HTML for social crawlers
        if ($http_user_agent ~* "facebookexternalhit|Twitterbot|LinkedInBot|Slackbot|Discordbot|WhatsApp|TelegramBot") {
            rewrite ^/reads/(.+?)/?$ /reads/_generated/pages/$1/index.html break;
        }
        try_files $uri $uri/ /reads/index.html;
    }

    # No caching for content and manifest — always serve fresh
    location /reads/content/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /reads/content-manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /reads {
        return 301 /reads/;
    }

    location = / {
        return 301 /reads/;
    }

    error_page 404 /reads/404.html;
}
