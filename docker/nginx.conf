server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Inject livereload polling script into HTML responses
    sub_filter_once on;
    sub_filter '</body>' '<script>(function(){var u="/reads/content-manifest.json",p=null;setInterval(function(){fetch(u,{cache:"no-store"}).then(function(r){return r.json()}).then(function(d){if(p&&p!==d.generatedAt)location.reload();p=d.generatedAt}).catch(function(){})},1500)})()</script></body>';

    location /reads/ {
        # Serve per-article OG HTML for social crawlers
        if ($http_user_agent ~* "facebookexternalhit|Twitterbot|LinkedInBot|Slackbot|Discordbot|WhatsApp|TelegramBot") {
            rewrite ^/reads/(.+?)/?$ /reads/_generated/pages/$1/index.html break;
        }
        try_files $uri $uri/ /reads/index.html;
    }

    # No caching for content and manifest — always serve fresh
    location /reads/content/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /reads/content-manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /reads {
        return 301 /reads/;
    }

    location = / {
        return 301 /reads/;
    }

    error_page 404 /reads/404.html;
}
